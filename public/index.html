<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>uncl — Trivia Daily</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❓</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; -webkit-font-smoothing: antialiased; background: #EEEEEE; }
    input, button, textarea { font-family: 'Roboto', sans-serif; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    button { -webkit-tap-highlight-color: transparent; }
    @keyframes popIn { 0% { transform: scale(0.7); opacity: 0 } 70% { transform: scale(1.05) } 100% { transform: scale(1); opacity: 1 } }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module" src="/app.jsx"></script>
  <script type="text/babel">
    // Wait for app.jsx to load, then render
    window.addEventListener('load', () => {
      const App = window.TriviaApp;
      if (App) {
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      } else {
        document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;color:#666">Loading failed. Please refresh.</div>';
      }
    });
  </script>
</body>
</html>
