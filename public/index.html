<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>uncl — Trivia Daily</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❓</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; -webkit-font-smoothing: antialiased; background: #EEEEEE; }
    input, button, textarea { font-family: 'Roboto', sans-serif; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    button { -webkit-tap-highlight-color: transparent; }
    @keyframes popIn { 0% { transform: scale(0.7); opacity: 0 } 70% { transform: scale(1.05) } 100% { transform: scale(1); opacity: 1 } }
    #root { min-height: 100vh; }
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: #6B7280; font-size: 15px; gap: 16px; }
    #loading .spinner { width: 36px; height: 36px; border: 3px solid #D0D0D0; border-top-color: #00ADB5; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading uncl…</span>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    fetch('/app.jsx?v=4')
      .then(function(r) { return r.text(); })
      .then(function(jsx) {
        var js = Babel.transform(jsx, { presets: ['react'] }).code;
        var script = document.createElement('script');
        script.textContent = js;
        document.body.appendChild(script);
        var App = window.TriviaApp;
        if (App) {
          ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
        } else {
          document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;color:#999">App failed to initialize. Please refresh.</div>';
        }
      })
      .catch(function(err) {
        console.error('Failed to load app:', err);
        document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;color:#c00">Error: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
